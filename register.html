<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | QuizForge</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="register">
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-mark">Q</span><span>QuizForge</span></a>
      <nav class="site-nav always"><a href="index.html">Discover</a><a href="login.html">Login</a></nav>
    </header>

    <main class="auth-shell">
      <section class="auth-card">
        <span class="eyebrow">Create account</span>
        <h1>Start publishing quizzes</h1>
        <form class="form-stack" id="register-form">
          <label>Name <input name="name" type="text" required maxlength="32" autocomplete="name" /></label>
          <label>Email <input name="email" type="email" required autocomplete="email" /></label>
          <label>Password <input name="password" type="password" required minlength="4" autocomplete="new-password" /></label>
          <button class="button primary" type="submit">Create account</button>
          <p class="form-note">Already registered? <a href="login.html">Login</a>.</p>
          <p class="status-message" data-status></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
