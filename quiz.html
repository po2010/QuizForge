<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attempt Quiz | QuizForge</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="quiz" data-protected="true">
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-mark">Q</span><span>QuizForge</span></a>
      <button class="nav-toggle" type="button" data-nav-toggle>Menu</button>
      <nav class="site-nav" data-nav>
        <a href="index.html">Discover</a>
        <a href="create.html">Create</a>
        <a href="my-quizzes.html">My quizzes</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="login.html" data-auth-link>Login</a>
      </nav>
    </header>

    <main>
      <section class="quiz-attempt-shell">
        <div class="room-gate panel" id="room-gate" hidden>
          <span class="eyebrow">Private room</span>
          <h1>Enter room no</h1>
          <p>This quiz is private. Ask the creator for the room number.</p>
          <form class="form-stack" id="room-unlock-form">
            <input name="roomCode" type="text" required placeholder="Room no" />
            <button class="button primary" type="submit">Unlock quiz</button>
            <p class="status-message" data-room-status></p>
          </form>
        </div>

        <article class="quiz-panel" id="attempt-panel" hidden>
          <div class="quiz-topline">
            <span class="eyebrow" id="attempt-category">Quiz</span>
            <span class="timer" id="attempt-timer">30s</span>
          </div>
          <div class="progress-track"><div class="progress-bar" id="attempt-progress"></div></div>
          <div class="question-meta">
            <span id="attempt-count">Question 1</span>
            <span id="attempt-score">Score 0</span>
          </div>
          <h1 class="question-title" id="attempt-question">Question</h1>
          <div class="answers" id="attempt-answers"></div>
          <p class="feedback" id="attempt-feedback"></p>
          <div class="quiz-actions">
            <a class="button secondary" id="attempt-leaderboard" href="leaderboard.html">Leaderboard</a>
            <button class="button primary" id="attempt-next" type="button" disabled>Next</button>
          </div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
