<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Quiz | QuizForge</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="create" data-protected="true">
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-mark">Q</span><span>QuizForge</span></a>
      <button class="nav-toggle" type="button" data-nav-toggle>Menu</button>
      <nav class="site-nav" data-nav>
        <a href="index.html">Discover</a>
        <a href="create.html">Create</a>
        <a href="my-quizzes.html">My quizzes</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="login.html" data-auth-link>Login</a>
      </nav>
    </header>

    <main>
      <section class="page-title">
        <span class="eyebrow">Quiz maker</span>
        <h1>Create and publish a quiz.</h1>
        <p>Choose public visibility or private room access. Add MCQ, fill in the blank, and true/false questions.</p>
      </section>

      <section class="builder-layout">
        <form class="panel form-stack" id="quiz-form">
          <div class="section-heading"><h2>Quiz details</h2></div>
          <label>Title <input name="title" type="text" required maxlength="70" /></label>
          <label>Description <textarea name="description" required maxlength="180"></textarea></label>
          <label>Tags <input name="tags" type="text" placeholder="science, class 8, html" /></label>
          <div class="form-grid">
            <label>Timer per question
              <select name="timer">
                <option value="15">15 seconds</option>
                <option value="30" selected>30 seconds</option>
                <option value="45">45 seconds</option>
                <option value="60">60 seconds</option>
              </select>
            </label>
            <label>Visibility
              <select name="visibility" id="visibility-select">
                <option value="public">Public</option>
                <option value="private">Private room</option>
              </select>
            </label>
          </div>
          <label id="room-code-row" hidden>Room no <input name="roomCode" type="text" placeholder="Auto-generated if empty" /></label>

          <div class="section-heading compact"><h2>Add question</h2></div>
          <label>Question type
            <select id="question-type">
              <option value="mcq">MCQ</option>
              <option value="truefalse">True / False</option>
              <option value="fill">Fill in the blank</option>
            </select>
          </label>
          <label>Question <textarea id="question-prompt"></textarea></label>
          <label id="options-row">Options <textarea id="question-options" placeholder="One option per line"></textarea></label>
          <label>Correct answer <input id="question-answer" type="text" placeholder="Exact answer" /></label>
          <button class="button secondary" id="add-question" type="button">Add question</button>
          <p class="status-message" data-builder-status></p>

          <button class="button primary" type="submit">Publish quiz</button>
        </form>

        <aside class="panel">
          <div class="section-heading">
            <span class="eyebrow">Preview</span>
            <h2>Questions added</h2>
          </div>
          <div class="list-stack" id="question-preview"></div>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
